<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Revolut Bank</title>
<style>
body{
font-family:Arial,sans-serif;
background:#fff;
color:#000;

button{
background:#000;
color:#fff;
padding:12px 24px;
border:none;

}
input{
width:80%;
padding:12px;
margin:8px;
border:1px solid #ddd;

}
.card{
border:1px solid #ddd;
padding:20px;

}

<body>
<nav style="padding:20px;border-bottom:1px solid #ddd;">

<a href="#">Prêts</a> |

</nav>
<h1>Revolut Bank</h1>
<p>Banque digitale moderne</p>

<div class="card">
<h2>Demande de prêt</h2>
<p>Effectuez votre demande rapidement.</p>
<button>Demander un prêt</button>
</div>

<div class="card">
<h2>Connexion</h2>
<input type="email" placeholder="Votre email"><br><br>
<input type="password" placeholder="Mot de passe"><br><br>
<button onclick="connexion()">Se connecter</button>
</div>
