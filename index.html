<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REVOLUT UK - Loan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

html,body{
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
position:relative;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;

background-image:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.78)
),
url("/background.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

transform:scale(1.02);

z-index:0;
}

/* GLASS OVERLAY */

.overlay{
position:absolute;
inset:0;

background:
radial-gradient(circle at top left,
rgba(255,255,255,.04),
transparent 30%);

z-index:1;
}

/* CONTAINER */

.container{
position:relative;
z-index:2;

width:92%;
max-width:560px;

padding:32px;

border-radius:28px;

background:
rgba(15,23,42,.68);

backdrop-filter:blur(24px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 0 1px rgba(255,255,255,.04),
0 30px 80px rgba(0,0,0,.65);
}

/* TITLE */

.logo{
width:68px;
height:68px;

margin:auto;
margin-bottom:18px;

border-radius:22px;

background:
linear-gradient(
135deg,
#ffffff,
#7c7c7c
);

display:flex;
justify-content:center;
align-items:center;

font-size:24px;
font-weight:700;

color:black;

box-shadow:
0 10px 35px rgba(255,255,255,.18);
}

h1{
text-align:center;
font-size:34px;
font-weight:700;
}

.subtitle{
text-align:center;
margin-top:10px;
margin-bottom:34px;

color:#cbd5e1;
font-size:15px;
}

/* FORM */

.field{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:10px;
font-size:14px;
color:#e2e8f0;
}

input{
width:100%;

padding:16px;

border:none;
border-radius:18px;

background:
rgba(2,6,23,.92);

color:white;

font-size:15px;

transition:.25s;
}

input:focus{
outline:none;

transform:translateY(-2px);

box-shadow:
0 0 0 4px rgba(255,255,255,.06),
0 10px 25px rgba(0,0,0,.35);
}

/* BUTTON */

button{
width:100%;

padding:18px;

margin-top:10px;

border:none;
border-radius:20px;

cursor:pointer;

font-size:16px;
font-weight:700;

background:
linear-gradient(
135deg,
#ffffff,
#cfcfcf
);

color:black;

transition:.3s;
}

button:hover{
transform:translateY(-2px);

box-shadow:
0 15px 35px rgba(255,255,255,.18);
}

/* RESULT */

.result{
display:none;

margin-top:24px;

padding:22px;

border-radius:20px;

background:
rgba(2,6,23,.92);

border:
1px solid rgba(255,255,255,.05);

animation:fade .4s ease;
}

.result strong{
display:block;

margin-top:12px;

font-size:28px;

color:white;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:600px){

.container{
padding:24px;
border-radius:24px;
}

h1{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<div class="logo">
R
</div>

<h1>REVOLUT UK</h1>

<p class="subtitle">
Demande de prêt sécurisée
</p>

<div class="field">
<label>Nom</label>
<input id="nom">
</div>

<div class="field">
<label>Prénom</label>
<input id="prenom">
</div>

<div class="field">
<label>Âge</label>
<input id="age" type="number">
</div>

<div class="field">
<label>Métier</label>
<input id="metier">
</div>

<div class="field">
<label>Revenu mensuel</label>
<input id="revenu" type="number">
</div>

<div class="field">
<label>Montant du prêt</label>
<input id="montant" type="number">
</div>

<div class="field">
<label>Durée (mois)</label>
<input id="duree" type="number">
</div>

<button onclick="submitLoan()">
Envoyer la demande
</button>

<div class="result" id="result"></div>

</div>

<script>

function submitLoan(){

const nom=document.getElementById("nom").value.trim();

const prenom=document.getElementById("prenom").value.trim();

const montant=parseFloat(
document.getElementById("montant").value
);

const duree=parseFloat(
document.getElementById("duree").value
);

if(!nom || !prenom || !montant || !duree){

alert("Veuillez remplir tous les champs.");

return;
}

/* Taux */

const tauxAnnuel=7;

const tauxMensuel=tauxAnnuel/100/12;

/* Calcul */

const mensualite=
(
montant*
tauxMensuel*
Math.pow(1+tauxMensuel,duree)
)
/
(
Math.pow(1+tauxMensuel,duree)-1
);

const result=document.getElementById("result");

result.style.display="block";

result.innerHTML=`

<h2>
Simulation validée
</h2>

<br>

<p>
${prenom} ${nom}
</p>

<br>

<p>
Montant demandé :
<b>${montant.toLocaleString()} €</b>
</p>

<p>
Durée :
<b>${duree} mois</b>
</p>

<p>
Taux :
<b>${tauxAnnuel}%</b>
</p>

<strong>
${mensualite.toFixed(2)} €/mois
</strong>

`;

}

</script>

</body>
</html>
