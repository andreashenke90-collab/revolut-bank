<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Demo Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#050816;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:linear-gradient(#6c63ff,#00d4ff);
filter:blur(180px);
top:-150px;
right:-150px;
opacity:.4;
z-index:-1;
}

.navbar{
display:flex;
justify-content:space-between;
padding:20px 8%;
}

.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:80px 8%;
min-height:70vh;
}

.hero h1{font-size:50px;}

.card3d{
width:360px;
height:220px;
border-radius:20px;
padding:25px;
background:linear-gradient(135deg,#1c2235,#0d1325);
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:40px 8%;
}

.stat{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:15px;
text-align:center;
}

.auth-section{
padding:50px 8%;
text-align:center;
}

.auth-box{
max-width:400px;
margin:auto;
background:rgba(255,255,255,.05);
padding:25px;
border-radius:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
background:#11192d;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

.primary{background:#6c63ff;color:white;}
.secondary{background:#00d4ff;}

.dashboard{
display:none;
padding:50px 8%;
}

.card{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:15px;
margin-top:20px;
}

.balance{font-size:40px;}

ul{list-style:none;}
li{padding:10px;border-bottom:1px solid rgba(255,255,255,.1);}

</style>

</head>

<body>

<div class="navbar">
<h2>Bank Demo</h2>
</div>

<section class="hero">
<div>
<h1>Banque digitale moderne</h1>
<p>Gérez votre argent facilement</p>
</div>

<div class="card3d">
<h3>Carte virtuelle</h3>
<br>
<h2>4532 **** **** 9012</h2>
</div>
</section>

<section class="stats">
<div class="stat"><h2>10K+</h2><p>Users</p></div>
