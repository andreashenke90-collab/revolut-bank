<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVOLUT UK - Demande de prêt</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#0a0f1e;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* CONTAINER */
.container{
width:100%;
max-width:600px;
background:#111827;
border-radius:18px;
padding:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* HEADER */
h1{
text-align:center;
font-size:26px;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#9ca3af;
margin-bottom:20px;
}

/* FORM */
.form-group{
margin-bottom:12px;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
color:#cbd5e1;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
outline:none;
}

input:focus{
border:1px solid #6c63ff;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
background:linear-gradient(135deg,#6c63ff,#00d4ff);
color:white;
transition:0.2s;
}

button:hover{
opacity:0.9;
transform:scale(1.02);
}

/* RESULT */
.result{
margin-top:15px;
padding:12px;
background:#0f172a;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>REVOLUT UK</h1>
<p class="subtitle">Demande de prêt en ligne</p>

<!-- FORM -->
<div class="form-group">
<label>Nom</label>
<input id="nom" type="text" placeholder="Entrez votre nom">
</div>

<div class="form-group">
<label>Prénom</label>
<input id="prenom" type="text" placeholder="Entrez votre prénom">
</div>

<div class="form-group">
<label>Âge</label>
<input id="age" type="number" placeholder="Votre âge">
</div>

<div class="form-group">
<label>Métier</label>
<input id="metier" type="text" placeholder="Votre métier">
</div>

<div class="form-group">
<label>Revenu mensuel (€)</label>
<input id="revenu" type="number" placeholder="Ex: 2500">
</div>

<div class="form-group">
<label>Montant du prêt (€)</label>
<input id="montant" type="number" placeholder="Ex: 5000">
</div>

<div class="form-group">
<label>Durée de remboursement (mois)</label>
<input id="duree" type="number" placeholder="Ex: 24">
</div>

<button onclick="submitLoan()">Envoyer la demande</button>

<div class="result" id="result"></div>

</div>

<script>

function submitLoan(){

const nom = document.getElementById("nom").value;
const prenom = document.getElementById("prenom").value;
const age = document.getElementById("age").value;
const metier = document.getElementById("metier").value;
const revenu = document.getElementById("revenu").value;
const montant = document.getElementById("montant").value;
const duree = document.getElementById("duree").value;

if(!nom || !prenom || !age || !metier || !revenu || !montant || !duree){
alert("Veuillez remplir tous les champs");
return;
}

const monthly = (montant / duree).toFixed(2);

const result = document.getElementById("result");
result.style.display = "block";

result.innerHTML = `
<strong>Demande envoyée ✔</strong><br><br>
Nom: ${nom} ${prenom}<br>
Âge: ${age}<br>
Métier: ${metier}<br>
Revenu: ${revenu} €<br>
Montant: ${montant} €<br>
Durée: ${duree} mois<br><br>
💰 Estimation mensualité: <b>${monthly} €</b>
`;

}

</script>

</body>
</html>
