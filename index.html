<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintech Revolut + Loan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0b1020;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* ===== SIDEBAR ===== */
.sidebar{
width:250px;
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.logo{
font-size:20px;
font-weight:700;
margin-bottom:10px;
}

.nav{
padding:12px;
border-radius:10px;
cursor:pointer;
background:transparent;
transition:.2s;
}

.nav:hover{background:#1e293b}

/* ===== MAIN ===== */
.main{
flex:1;
padding:25px;
overflow:auto;
}

/* ===== CARDS ===== */
.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.balance{
font-size:40px;
font-weight:700;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

/* ===== LOAN FORM ===== */
input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
margin-top:8px;
}

.primary{background:#6366f1;color:white;}
.secondary{background:#06b6d4;color:white;}

ul{list-style:none;}
li{padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);}

/* ===== LOGIN ===== */
.login{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#0b1020;
}

.box{
width:380px;
background:#111827;
padding:25px;
border-radius:15px;
}

.hidden{display:none;}

</style>

</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
<div class="box">
<h2>Fintech Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

<button class="primary" onclick="register()">Créer compte</button>
<button class="secondary" onclick="login()">Connexion</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="sidebar">
<div class="logo">REVOLUT+</div>

<div class="nav" onclick="show('home')">🏠 Dashboard</div>
<div class="nav" onclick="show('loan')">💸 Loan Request</div>
<div class="nav" onclick="show('cards')">💳 Card</div>
<div class="nav" onclick="logout()">🚪 Logout</div>
</div>

<!-- MAIN -->
<div class="main hidden" id="main">

<!-- DASHBOARD -->
<div id="home">

<div class="card">
<h3>Balance</h3>
<div class="balance">€ <span id="balance">0</span></div>
</div>

<div class="grid">

<div class="card">
<h3>Historique</h3>
<ul id="history"></ul>
</div>

<div class="card">
<h3>Actions</h3>
<button class="primary" onclick="deposit()">+ Dépôt 50€</button>
<button class="secondary" onclick="transfer()">- Transfert 20€</button>
</div>

</div>

</div>

<!-- LOAN SYSTEM -->
<div id="loan" class="hidden card">

<h2>Loan Request</h2>

<input id="amount" type="number" placeholder="Montant du prêt (€)">
<input id="months" type="number" placeholder="Durée (mois)">
<input id="income" type="number" placeholder="Revenu mensuel (€)">

<button class="primary" onclick="calculateLoan()">Calculer</button>
<button class="secondary" onclick="submitLoan()">Envoyer demande</button>

<h3 id="loanResult"></h3>

</div>

<!-- CARDS -->
<div id="cards" class="hidden card">

<h2>Carte virtuelle</h2>
<p id="cardNumber">**** **** **** ****</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
arrayUnion,
addDoc,
collection
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD9MXofDad3s2A39CaVOkYylseXlCVyMlo",
authDomain: "revolut-bank-a462c.firebaseapp.com",
projectId: "revolut-bank-a462c",
storageBucket: "revolut-bank-a462c.firebasestorage.app",
messagingSenderId: "834944913629",
appId: "1:834944913629:web:32f821517ac21965600b34"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// ===== REGISTER =====
window.register = async () => {
let user = await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);

let card = "4532 " + Math.floor(Math.random()*9999) + " **** ****";

await setDoc(doc(db,"users",user.user.uid),{
email:email.value,
balance:1000,
card,
history:["Compte créé"]
});
};

// ===== LOGIN =====
window.login = async () => {
await signInWithEmailAndPassword(auth,email.value,password.value);
};

// ===== LOGOUT =====
window.logout = () => signOut(auth);

// ===== AUTH =====
onAuthStateChanged(auth,async(user)=>{
if(user){
currentUser=user;

loginPage.classList.add("hidden");
sidebar.classList.remove("hidden");
main.classList.remove("hidden");

loadUser(user);
}
});

// ===== LOAD USER =====
async function loadUser(user){
let snap = await getDoc(doc(db,"users",user.uid));
let data = snap.data();

balance.innerText=data.balance;
history.innerHTML=data.history.map(h=>`<li>${h}</li>`).join("");
cardNumber.innerText=data.card;
}

// ===== DEPOSIT =====
window.deposit = async () => {
let ref = doc(db,"users",currentUser.uid);
let snap = await getDoc(ref);
let data = snap.data();

await updateDoc(ref,{
balance:data.balance+50,
history:arrayUnion("+50€ dépôt")
});

loadUser(currentUser);
};

// ===== TRANSFER =====
window.transfer = async () => {
let ref = doc(db,"users",currentUser.uid);
let snap = await getDoc(ref);
let data = snap.data();

await updateDoc(ref,{
balance:data.balance-20,
history:arrayUnion("-20€ transfert")
});

loadUser(currentUser);
};

// ===== LOAN CALCULATOR =====
window.calculateLoan = () => {
let amount = Number(amount.value);
let months = Number(months.value);

let rate = 0.05;
let monthly = (amount * rate / 12) / (1 - Math.pow(1 + rate/12, -months));

loanResult.innerText = "Mensualité: € " + monthly.toFixed(2);
};

// ===== LOAN SUBMIT =====
window.submitLoan = async () => {
await addDoc(collection(db,"loans"),{
uid:currentUser.uid,
amount:Number(amount.value),
months:Number(months.value),
income:Number(income.value),
status:"pending",
date:Date.now()
});

loanResult.innerText="Demande envoyée ✔";
};

// ===== NAVIGATION =====
window.show = (page) => {

["home","loan","cards"].forEach(p=>{
document.getElementById(p).classList.add("hidden");
});

document.getElementById(page).classList.remove("hidden");
};

</script>

</body>
</html>
