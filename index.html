<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REVOLUT UK - Loan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Inter,sans-serif;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
position:relative;
}

/* BACKGROUND */

.bg{
position:absolute;
inset:0;
background-image:url("a_sleek_high_contrast_3d_product_render_abstrac.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
transform:scale(1.03);
z-index:0;
}

/* OVERLAY */

.overlay{
position:absolute;
inset:0;
background:
linear-gradient(
to bottom,
rgba(0,0,0,.45),
rgba(0,0,0,.75)
);
backdrop-filter:blur(2px);
z-index:1;
}

/* CONTAINER */

.container{
position:relative;
z-index:2;
width:90%;
max-width:560px;
padding:32px;
border-radius:28px;

background:rgba(17,24,39,.72);

backdrop-filter:blur(24px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 0 1px rgba(255,255,255,.04),
0 30px 80px rgba(0,0,0,.55);
}

/* TITLE */

h1{
text-align:center;
margin:0;
font-size:34px;
font-weight:700;
}

.subtitle{
text-align:center;
margin-top:10px;
margin-bottom:30px;
color:#cbd5e1;
}

/* FORM */

.field{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
color:#cbd5e1;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:rgba(15,23,42,.95);
color:white;
font-size:15px;
transition:.25s;
box-sizing:border-box;
}

input:focus{
outline:none;
box-shadow:0 0 0 4px rgba(255,255,255,.08);
transform:translateY(-1px);
}

/* BUTTON */

button{
width:100%;
padding:16px;
border:none;
border-radius:18px;
cursor:pointer;

background:
linear-gradient(
135deg,
#ffffff,
#d4d4d8
);

color:black;

font-size:16px;
font-weight:700;

transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 15px 35px rgba(255,255,255,.15);
}

/* RESULT */

.result{
display:none;
margin-top:22px;
padding:20px;
border-radius:18px;

background:rgba(15,23,42,.95);

border:1px solid rgba(255,255,255,.05);
}

.result strong{
font-size:24px;
display:block;
margin-top:10px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<h1>REVOLUT UK</h1>

<p class="subtitle">
Demande de prêt sécurisée
</p>

<div class="field">
<label>Nom</label>
<input id="nom">
</div>

<div class="field">
<label>Prénom</label>
<input id="prenom">
</div>

<div class="field">
<label>Âge</label>
<input id="age" type="number">
</div>

<div class="field">
<label>Métier</label>
<input id="metier">
</div>

<div class="field">
<label>Revenu mensuel</label>
<input id="revenu" type="number">
</div>

<div class="field">
<label>Montant du prêt</label>
<input id="montant" type="number">
</div>

<div class="field">
<label>Durée (mois)</label>
<input id="duree" type="number">
</div>

<button onclick="submitLoan()">
Envoyer
</button>

<div class="result" id="result"></div>

</div>

<script>

function submitLoan(){

const nom=document.getElementById("nom").value.trim();
const prenom=document.getElementById("prenom").value.trim();

const montant=parseFloat(
document.getElementById("montant").value
);

const duree=parseFloat(
document.getElementById("duree").value
);

if(!nom || !prenom || !montant || !duree){

alert("Veuillez remplir tous les champs.");

return;
}

const tauxAnnuel=7;
const tauxMensuel=tauxAnnuel/100/12;

const mensualite=
(
montant*
tauxMensuel*
Math.pow(1+tauxMensuel,duree)
)
/
(
Math.pow(1+tauxMensuel,duree)-1
);

const result=document.getElementById("result");

result.style.display="block";

result.innerHTML=`
<h2>Simulation validée</h2>

<p>
${prenom} ${nom}
</p>

<p>
Montant :
<b>${montant.toLocaleString()} €</b>
</p>

<p>
Durée :
<b>${duree} mois</b>
</p>

<strong>
${mensualite.toFixed(2)} €/mois
</strong>
`;

}

</script>

</body>
</html>
