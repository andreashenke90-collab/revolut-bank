<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVOLUT UK - Loan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html, body{
height:100%;
margin:0;
padding:0;
font-family:Inter;
}

/* 🌍 BACKGROUND IMAGE FIXÉ */
body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
color:white;
}

/* IMAGE FOND */
.bg{
position:absolute;
inset:0;
background-image:url("https://images.unsplash.com/photo-1565372914081-f0f2c4d4a2d2?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
transform:scale(1.05);
z-index:0;
}

/* DARK OVERLAY */
.overlay{
position:absolute;
inset:0;
background:rgba(10,15,30,0.75);
z-index:1;
}

/* CONTAINER */
.container{
position:relative;
z-index:2;
width:100%;
max-width:600px;
background:rgba(17,24,39,0.88);
backdrop-filter:blur(18px);
border-radius:18px;
padding:25px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* TITLE */
h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:18px;
}

/* FORM */
label{
font-size:13px;
color:#cbd5e1;
display:block;
margin-top:10px;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
background:linear-gradient(135deg,#6c63ff,#00d4ff);
color:white;
}

.result{
margin-top:15px;
padding:12px;
background:#0f172a;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<h1>REVOLUT UK</h1>
<p class="subtitle">Demande de prêt sécurisée</p>

<label>Nom</label>
<input id="nom">

<label>Prénom</label>
<input id="prenom">

<label>Âge</label>
<input id="age" type="number">

<label>Métier</label>
<input id="metier">

<label>Revenu mensuel</label>
<input id="revenu" type="number">

<label>Montant du prêt</label>
<input id="montant" type="number">

<label>Durée (mois)</label>
<input id="duree" type="number">

<button onclick="submitLoan()">Envoyer</button>

<div class="result" id="result"></div>

</div>

<script>

function submitLoan(){

const nom=document.getElementById("nom").value;
const prenom=document.getElementById("prenom").value;
const age=document.getElementById("age").value;
const metier=document.getElementById("metier").value;
const revenu=document.getElementById("revenu").value;
const montant=document.getElementById("montant").value;
const duree=document.getElementById("duree").value;

if(!nom||!prenom||!age||!metier||!revenu||!montant||!duree){
alert("Remplis tous les champs");
return;
}

let mensualite=(montant/duree).toFixed(2);

let result=document.getElementById("result");
result.style.display="block";

result.innerHTML=`
✔ Demande envoyée<br><br>
${nom} ${prenom}<br>
Montant: ${montant}€<br>
Durée: ${duree} mois<br>
💰 Mensualité: <b>${mensualite}€</b>
`;

}

</script>

</body>
</html>
