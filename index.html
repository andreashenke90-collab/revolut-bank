<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintech Bank Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#070b1a;
color:white;
overflow-x:hidden;
}

/* BACKGROUND EFFECT */
body::before{
content:'';
position:fixed;
width:600px;
height:600px;
background:linear-gradient(45deg,#6c63ff,#00d4ff);
filter:blur(180px);
top:-200px;
right:-200px;
opacity:.4;
z-index:-1;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 8%;
}

/* HERO */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:70px 8%;
}

.hero h1{
font-size:55px;
}

.card{
width:360px;
height:220px;
border-radius:20px;
padding:20px;
background:linear-gradient(135deg,#1a1f35,#0d1325);
box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:50px 8%;
}

.stat{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:15px;
text-align:center;
}

/* AUTH */
.auth{
padding:50px 8%;
text-align:center;
}

.box{
max-width:400px;
margin:auto;
background:rgba(255,255,255,.05);
padding:25px;
border-radius:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
background:#11192d;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

.primary{background:#6c63ff;color:white;}
.secondary{background:#00d4ff;color:white;}

/* DASHBOARD */
.dashboard{
display:none;
padding:50px 8%;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.boxCard{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:15px;
}

.balance{
font-size:40px;
margin-top:10px;
}

ul{
list-style:none;
margin-top:10px;
}

li{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.1);
}

@media(max-width:900px){
.hero{flex-direction:column;text-align:center;}
.grid{grid-template-columns:1fr;}
.stats{grid-template-columns:1fr;}
}

</style>

</head>

<body>

<!-- NAV -->
<nav>
<h2>FINTECH BANK</h2>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>Banque digitale nouvelle génération</h1>
<p>Gérez votre argent intelligemment</p>
</div>

<div class="card">
<h3>CARTE VIRTUELLE</h3>
<br>
<h2 id="cardNumber">4532 **** **** 9012</h2>
<br>
<p>EXP: 12/29
