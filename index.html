<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revolut Bank 🏦</title>

<!-- Firebase v10 (moderne) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ⚠️ REMPLACE PAR TES INFOS FIREBASE
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_AUTH_DOMAIN",
  projectId: "TON_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// INSCRIPTION
window.register = async function(){
  try{
    let userCred = await createUserWithEmailAndPassword(auth, email.value, password.value);

    await setDoc(doc(db, "users", userCred.user.uid), {
      email: email.value,
      balance: 1000,
      history: []
    });

    alert("Compte créé !");
  }catch(e){
    alert(e.message);
  }
}

// LOGIN
window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth, email.value, password.value);
  }catch(e){
    alert(e.message);
  }
}

// AUTH STATE
onAuthStateChanged(auth, async (user)=>{
  if(user){
    appDiv.style.display="block";
    loadData(user);
  }else{
    appDiv.style.display="none";
  }
});

// LOAD DATA
async function loadData(user){
  let ref = doc(db, "users", user.uid);
  let snap = await getDoc(ref);
  let data = snap.data();

  userName.innerText = user.email;
  balance.innerText = data.balance;

  history.innerHTML = "";
  data.history.forEach(h=>{
    let li = document.createElement("li");
    li.innerText = h;
    history.appendChild(li);
  });
}

// LOGOUT
window.logout = function(){
  signOut(auth);
}

</script>

<style>
body{background:black;color:white;text-align:center;font-family:Arial;}
input,button{padding:10px;margin:5px;border-radius:8px;border:none;}
</style>

</head>

<body>

<h1>Revolut Bank 🏦</h1>

<div>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="register()">Créer compte</button>
<button onclick="login()">Connexion</button>
</div>

<div id="appDiv" style="display:none">
<h2 id="userName"></h2>
<h3>💼 Solde : <span id="balance">0</span> €</h3>

<button onclick="logout()">Déconnexion</button>

<ul id="history"></ul>
</div>

</body>
</html>
