<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintech Ultra Fast</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#0a0f1e;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.nav{
padding:12px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.nav:hover{background:#1e293b}

/* MAIN */
.main{
flex:1;
padding:25px;
overflow:auto;
}

/* UI */
.card{
background:#111827;
padding:18px;
border-radius:14px;
margin-bottom:15px;
}

.big{
font-size:42px;
font-weight:700;
}

/* FINANCE RINGS */
.rings{
display:flex;
gap:12px;
flex-wrap:wrap;
margin:15px 0;
}

.circle{
width:110px;
height:110px;
border-radius:50%;
background:linear-gradient(135deg,#6c63ff,#00d4ff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* LOGIN */
.login{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#0a0f1e;
}

.box{
width:360px;
background:#111827;
padding:20px;
border-radius:14px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
margin-top:8px;
}

.primary{background:#6c63ff;color:white;}
.secondary{background:#00d4ff;color:white;}

.hidden{display:none;}

</style>

</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
<div class="box">
<h2>Fintech Ultra Fast</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

<button class="primary" onclick="register()">Créer compte</button>
<button class="secondary" onclick="login()">Connexion</button>

</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="sidebar">
<div class="nav" onclick="navigate('home')">🏠 Dashboard</div>
<div class="nav" onclick="navigate('loan')">💸 Loan</div>
<div class="nav" onclick="navigate('cards')">💳 Cards</div>
<div class="nav" onclick="logout()">🚪 Logout</div>
</div>

<!-- MAIN -->
<div class="main hidden" id="main">

<!-- HOME -->
<div id="home" class="page">

<div class="card">
<h2>Balance</h2>
<div class="big">€ <span id="balance">0</span></div>
</div>

<div class="rings">
<div class="circle">💳<br><b>Credit</b></div>
<div class="circle">💰<br><b>Cash</b></div>
<div class="circle">📊<br><b>Loan</b></div>
</div>

<div class="card">
<h3>Historique</h3>
<ul id="history"></ul>
</div>

<div class="card">
<button class="primary" onclick="deposit()">+50€</button>
<button class="secondary" onclick="transfer()">-20€</button>
</div>

</div>

<!-- LOAN -->
<div id="loan" class="page hidden">

<div class="card">
<h2>Loan System</h2>

<input id="amount" placeholder="Montant">
<input id="months" placeholder="Durée">
<input id="income" placeholder="Revenu">

<button class="primary" onclick="calcLoan()">Calculer</button>
<button class="secondary" onclick="sendLoan()">Envoyer</button>

<h3 id="result"></h3>

</div>

</div>

<!-- CARDS -->
<div id="cards" class="page hidden">

<div class="card">
<h2>Card</h2>
<h3 id="cardNumber">----</h3>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
arrayUnion,
addDoc,
collection
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ================= FIREBASE ================= */
const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* ================= STATE ================= */
let state = {
user:null,
data:null
};

/* ================= NAV (FAST) ================= */
window.navigate = (page) => {

document.querySelectorAll(".page")
.forEach(p => p.classList.add("hidden"));

document.getElementById(page).classList.remove("hidden");

state.page = page;
};

/* ================= AUTH ================= */
window.register = async () => {
await createUserWithEmailAndPassword(auth,email.value,password.value);

await setDoc(doc(db,"users",auth.currentUser.uid),{
email:email.value,
balance:1000,
card:"4532 ****",
history:["Account created"]
});
};

window.login = async () => {
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = () => signOut(auth);

/* ================= AUTH STATE ================= */
onAuthStateChanged(auth, async(user)=>{
if(user){

state.user = user;

loginPage.classList.add("hidden");
sidebar.classList.remove("hidden");
main.classList.remove("hidden");

loadUser(user);
}
});

async function
