<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVOLUT UK - Loan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0a0f1e;
overflow:hidden;
position:relative;
color:white;
}

/* 🌌 FINTECH BACKGROUND */
.bg{
position:absolute;
inset:0;
background:radial-gradient(circle at 20% 20%, #6c63ff33, transparent 40%),
           radial-gradient(circle at 80% 30%, #00d4ff33, transparent 40%),
           radial-gradient(circle at 50% 80%, #ff3d7733, transparent 40%);
filter:blur(20px);
z-index:0;
animation:move 12s infinite alternate;
}

@keyframes move{
0%{transform:scale(1) translateY(0)}
100%{transform:scale(1.1) translateY(-20px)}
}

/* CARD */
.container{
position:relative;
z-index:1;
width:100%;
max-width:620px;
background:rgba(17,24,39,0.85);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* TITLE */
h1{
text-align:center;
font-size:28px;
font-weight:700;
}

.subtitle{
text-align:center;
color:#9ca3af;
margin-bottom:20px;
}

/* FORM */
.form-group{
margin-bottom:12px;
}

label{
display:block;
margin-bottom:6px;
font-size:13px;
color:#cbd5e1;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
outline:none;
transition:0.2s;
}

input:focus{
border:1px solid #6c63ff;
box-shadow:0 0 10px #6c63ff33;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
margin-top:10px;
background:linear-gradient(135deg,#6c63ff,#00d4ff);
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
opacity:0.95;
}

/* RESULT */
.result{
margin-top:15px;
padding:12px;
background:#0f172a;
border-radius:10px;
display:none;
border:1px solid rgba(255,255,255,0.05);
}

</style>

</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- FORM -->
<div class="container">

<h1>REVOLUT UK</h1>
<p class="subtitle">Demande de prêt en ligne sécurisée</p>

<div class="form-group">
<label>Nom</label>
<input id="nom" placeholder="Votre nom">
</div>

<div class="form-group">
<label>Prénom</label>
<input id="prenom" placeholder="Votre prénom">
</div>

<div class="form-group">
<label>Âge</label>
<input id="age" type="number" placeholder="Ex: 25">
</div>

<div class="form-group">
<label>Métier</label>
<input id="metier" placeholder="Votre métier">
</div>

<div class="form-group">
<label>Revenu mensuel (€)</label>
<input id="revenu" type="number" placeholder="Ex: 2500">
</div>

<div class="form-group">
<label>Montant du prêt (€)</label>
<input id="montant" type="number" placeholder="Ex: 5000">
</div>

<div class="form-group">
<label>Durée de remboursement (mois)</label>
<input id="duree" type="number" placeholder="Ex: 24">
</div>

<button onclick="submitLoan()">Envoyer la demande</button>

<div class="result" id="result"></div>

</div>

<script>

function submitLoan(){

const nom = document.getElementById("nom").value;
const prenom = document.getElementById("prenom").value;
const age = document.getElementById("age").value;
const metier = document.getElementById("metier").value;
const revenu = document.getElementById("revenu").value;
const montant = document.getElementById("montant").value;
const duree = document.getElementById("duree").value;

if(!nom || !prenom || !age || !metier || !revenu || !montant || !duree){
alert("Veuillez remplir tous les champs");
return;
}

const mensualite = (montant / duree).toFixed(2);

const result = document.getElementById("result");
result.style.display = "block";

result.innerHTML = `
<strong>✔ Demande envoyée avec succès</strong><br><br>
Nom: ${nom} ${prenom}<br>
Âge: ${age}<br>
Métier: ${metier}<br>
Revenu: ${revenu} €<br>
Montant: ${montant} €<br>
Durée: ${duree} mois<br><br>
💰 Mensualité estimée: <b>${mensualite} €</b>
`;

}

</script>

</body>
</html>
