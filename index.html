<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoBank Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#0a0f1e;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.nav{
padding:12px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.nav:hover{background:#1e293b}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow:auto;
}

/* CARDS */
.card{
background:#111827;
padding:16px;
border-radius:16px;
margin-bottom:15px;
}

/* BIG BALANCE */
.big{
font-size:40px;
font-weight:700;
}

/* RINGS */
.rings{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.circle{
width:100px;
height:100px;
border-radius:50%;
background:linear-gradient(135deg,#6c63ff,#00d4ff);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* LOGIN */
.login{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#0a0f1e;
}

.box{
width:340px;
background:#111827;
padding:20px;
border-radius:16px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
margin-top:8px;
}

.primary{background:#6c63ff;color:white;}
.secondary{background:#00d4ff;color:white;}

.hidden{display:none}

/* MOBILE */
@media(max-width:768px){
body{flex-direction:column}
.sidebar{width:100%;flex-direction:row;overflow:auto}
.big{font-size:28px}
}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
<div class="box">
<h2>NeoBank Pro</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

<button class="primary" onclick="register()">Créer compte</button>
<button class="secondary" onclick="login()">Connexion</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="sidebar">
<div class="nav" onclick="navigate('home')">🏠 Dashboard</div>
<div class="nav" onclick="navigate('loan')">💸 Loan</div>
<div class="nav" onclick="navigate('cards')">💳 Card</div>
<div class="nav" onclick="logout()">🚪 Logout</div>
</div>

<!-- MAIN -->
<div class="main hidden" id="main">

<!-- HOME -->
<div id="home" class="page">

<div class="card">
<h2>Balance</h2>
<div class="big">€ <span id="balance">0</span></div>
</div>

<div class="rings">
<div class="circle">💳<br><b>Card</b></div>
<div class="circle">💰<br><b>Cash</b></div>
<div class="circle">📊<br><b>Loan</b></div>
</div>

<div class="card">
<h3>Historique</h3>
<ul id="history"></ul>
</div>

<div class="card">
<button class="primary" onclick="deposit()">+50€</button>
<button class="secondary" onclick="transfer()">-20€</button>
</div>

</div>

<!-- LOAN -->
<div id="loan" class="page hidden">

<div class="card">
<h2>Loan System</h2>

<input id="amount" placeholder="Montant">
<input id="months" placeholder="Durée">
<input id="income" placeholder="Revenu">

<button class="primary" onclick="calcLoan()">Calculer</button>
<button class="secondary" onclick="sendLoan()">Envoyer</button>

<h3 id="result"></h3>
</div>

</div>

<!-- CARDS -->
<div id="cards" class="page hidden">

<div class="card">
<h2>Virtual Card</h2>
<h3 id="cardNumber">**** **** **** 1234</h3>
</div>

</div>

</div>
